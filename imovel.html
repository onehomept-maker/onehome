  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  

const supabaseUrl = "https://skznafnlkretulgzklue.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrem5hZm5sa3JldHVsZ3prbHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTkyMzYsImV4cCI6MjA4ODk3NTIzNn0.2Qf6Qo9xwrtWyL15SBOGtuVDVI-EEIornO0WTVsg4I8"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

const params = new URLSearchParams(window.location.search)
const slug = params.get("slug")

async function carregarImovel(){

const { data: imovel, error } = await supabaseClient
.from("imoveis")
.select("*")
.eq("slug", slug)
.single()

console.log(imovel)
console.log(error)
  
const container = document.getElementById("imovel-container")

if(error || !imovel){
container.innerHTML = "<p>Imóvel não encontrado.</p>"
return
}

let imagensHTML = ""

if(imovel.imagens && Array.isArray(imovel.imagens)){
imagensHTML = imovel.imagens.map(img => `<img src="${img}">`).join("")
}

container.innerHTML =
imagensHTML +
"<h1>" + (imovel.titulo || "") + "</h1>" +
"<p><strong>" + (imovel.local || "") + "</strong></p>" +
"<p>" + (imovel.descricao || "") + "</p>" +
"<p><strong>" + (imovel.preco || "") + "</strong></p>"


}

carregarImovel()
</script>

</body>
