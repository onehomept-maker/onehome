<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | One Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:'Inter', sans-serif;
margin:0;
background:#f6f7fb;
}

/* container principal */

.admin{
max-width:1100px;
margin:auto;
padding:60px 40px;
}

/* título */

h1{
margin-bottom:40px;
font-weight:500;
}

/* layout do formulário */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

/* campos largos */

.full{
grid-column:1 / -1;
}

/* labels */

label{
display:block;
font-size:13px;
margin-bottom:6px;
color:#555;
}

/* inputs */

input, textarea, select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-family:'Inter', sans-serif;
font-size:14px;
}

/* textarea maior */

textarea{
min-height:120px;
resize:vertical;
}

/* botão */

button{
margin-top:30px;
padding:14px 24px;
background:#1f3f8c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#162f6a;
}

/* resultado */

#resultado{
margin-top:40px;
background:white;
padding:20px;
border-radius:6px;
border:1px solid #eee;
}
#lista-imoveis-admin{
margin-top:20px;
}

.item-admin{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #ddd;
}

.item-admin button{
background:#1f3f8c;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
}  
  
</style>

</head>

<body>

<div class="admin">

<h1>Criar Imóvel</h1>

<div class="form-grid">

<div>
<label>Título</label>
<input id="titulo">
</div>

<div>
<label>Slug (url)</label>
<input id="slug">
</div>

<div>
<label>Localização</label>
<input id="local">
</div>

<div>
<label>Preço</label>
<input id="preco">
</div>

<div>
<label>Estado</label>
<select id="estado">
<option value="disponivel">Disponível</option>
<option value="reservado">Reservado</option>
<option value="vendido">Vendido</option>
<option value="arrendado">Arrendado</option>
</select>
</div>

<div class="full">
<label>Fotos do imóvel</label>
<input type="file" id="imagens" multiple>
</div>

<div class="full">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

</div>
<button onclick="gerarJSON()">Gerar imóvel</button>

<div id="resultado"></div>
  
  <h2 style="margin-top:60px">Imóveis existentes</h2>

<div id="lista-imoveis-admin"></div>
  
<script>

const supabaseUrl = "https://skznafnlkretulgzklue.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrem5hZm5sa3JldHVsZ3prbHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTkyMzYsImV4cCI6MjA4ODk3NTIzNn0.2Qf6Qo9xwrtWyL15SBOGtuVDVI-EEIornO0WTVsg4I8"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

async function gerarJSON() {
  const files = document.getElementById("imagens").files;
  let imagens = [];

  for (let file of files) {
    const fileName = `${Date.now()}-${file.name}`;

    const { error: uploadError } = await supabaseClient
      .storage
      .from("imoveis")
      .upload(fileName, file);

    if (uploadError) {
      alert("Erro no upload: " + uploadError.message);
      console.log(uploadError);
      return;
    }

    const { data } = supabaseClient
      .storage
      .from("imoveis")
      .getPublicUrl(fileName);

    imagens.push(data.publicUrl);
  }

  const novoImovel = {
    titulo: document.getElementById("titulo").value,
    slug: document.getElementById("slug").value,
    local: document.getElementById("local").value,
    preco: document.getElementById("preco").value,
    estado: document.getElementById("estado").value,
    descricao: document.getElementById("descricao").value,
    imagens: imagens
  };

  const { error: insertError } = await supabaseClient
  
   if(window.imovelEditando){

await supabaseClient
.from("imoveis")
.update(novoImovel)
.eq("id", window.imovelEditando)

}else{

await supabaseClient
.from("imoveis")
.insert([novoImovel])

}

  if (insertError) {
    alert("Erro ao guardar imóvel: " + insertError.message);
    console.log(insertError);
    return;
  }

  document.getElementById("resultado").innerText = "Imóvel guardado com sucesso!";
  alert("Imóvel guardado com sucesso!");
}
  async function carregarListaAdmin(){

const { data: imoveis, error } = await supabaseClient
.from("imoveis")
.select("*")
.order("id", { ascending:false })

const container = document.getElementById("lista-imoveis-admin")

container.innerHTML = ""

imoveis.forEach(imovel => {

const item = document.createElement("div")
item.className = "item-admin"

item.innerHTML = `
<span>${imovel.titulo}</span>
<button onclick="editarImovel('${imovel.id}')">Editar</button>
`

container.appendChild(item)

})

}

carregarListaAdmin()
async function editarImovel(id){

const { data: imovel } = await supabaseClient
.from("imoveis")
.select("*")
.eq("id", id)
.single()

document.getElementById("titulo").value = imovel.titulo
document.getElementById("slug").value = imovel.slug
document.getElementById("local").value = imovel.local
document.getElementById("preco").value = imovel.preco
document.getElementById("estado").value = imovel.estado
document.getElementById("descricao").value = imovel.descricao

window.imovelEditando = id

}  
</script>

</div>

</body>
</html>
