<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | One Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:'Inter', sans-serif;
margin:0;
background:#f6f7fb;
}

.admin{
max-width:1100px;
margin:auto;
padding:60px 40px;
}

h1{
margin-bottom:40px;
font-weight:500;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.full{
grid-column:1 / -1;
}

label{
display:block;
font-size:13px;
margin-bottom:6px;
color:#555;
}

input, textarea, select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-family:'Inter', sans-serif;
font-size:14px;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
margin-top:30px;
padding:14px 24px;
background:#1f3f8c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#162f6a;
}

#resultado{
margin-top:40px;
background:white;
padding:20px;
border-radius:6px;
border:1px solid #eee;
}

/* lista imóveis */

#lista-imoveis-admin{
margin-top:20px;
}

.item-admin{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #ddd;
}

.item-admin button{
margin-top:0;
background:#1f3f8c;
padding:6px 12px;
font-size:13px;
}

/* GALERIA ADMIN */

.lista-imagens-admin{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-top:12px;
}

.foto-admin{
background:white;
border:1px solid #ddd;
border-radius:10px;
overflow:hidden;
cursor:grab;
}

.foto-admin img{
width:100%;
height:150px;
object-fit:cover;
}

.foto-admin-info{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.foto-admin-numero{
font-size:13px;
color:#555;
}

.foto-admin-apagar{
margin-top:0;
padding:6px 10px;
background:#b42318;
border:none;
border-radius:6px;
color:white;
font-size:12px;
cursor:pointer;
}

.foto-admin-apagar:hover{
background:#8f1c13;
}

</style>
</head>

<body>

<div class="admin">

<h1>Criar Imóvel</h1>

<div class="form-grid">

<div>
<label>Título</label>
<input id="titulo">
</div>

<div>
<label>Slug</label>
<input id="slug">
</div>

<div>
<label>Localização</label>
<input id="local">
</div>

<div>
<label>Preço</label>
<input id="preco">
</div>

<div>
<label>Estado</label>
<select id="estado">
<option value="disponivel">Disponível</option>
<option value="reservado">Reservado</option>
<option value="vendido">Vendido</option>
<option value="arrendado">Arrendado</option>
</select>
</div>

<div>
<label>Tipologia</label>
<input id="tipologia">
</div>

<div>
<label>Quartos</label>
<input id="quartos">
</div>

<div>
<label>WC</label>
<input id="wc">
</div>

<div>
<label>Área Bruta</label>
<input id="area_bruta">
</div>

<div>
<label>Área Útil</label>
<input id="area_util">
</div>

<div>
<label>Classe energética</label>
<select id="categoria_energetica">
<option value="">Selecionar</option>
<option>A+</option>
<option>A</option>
<option>B</option>
<option>B-</option>
<option>C</option>
<option>D</option>
<option>E</option>
<option>F</option>
<option>G</option>
</select>
</div>

<div class="full">
<label>Adicionar novas fotos</label>
<input type="file" id="imagens" multiple>
</div>

<div class="full">
<label>Fotografias atuais</label>
<div id="lista-imagens-admin" class="lista-imagens-admin"></div>
</div>

<div class="full">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

</div>

<button id="botaoGuardar" onclick="gerarJSON()">Guardar imóvel</button>

<div id="resultado"></div>

<h2 style="margin-top:60px">Imóveis existentes</h2>

<div id="lista-imoveis-admin"></div>

<script>

const supabaseUrl = "https://skznafnlkretulgzklue.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrem5hZm5sa3JldHVsZ3prbHVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTkyMzYsImV4cCI6MjA4ODk3NTIzNn0.2Qf6Qo9xwrtWyL15SBOGtuVDVI-EEIornO0WTVsg4I8"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

let imagensExistentes = []
let dragIndex = null
let imovelEditando = null

function renderizarImagensAdmin(){

const container = document.getElementById("lista-imagens-admin")
container.innerHTML = ""

imagensExistentes.forEach((url,index)=>{

const div = document.createElement("div")
div.className="foto-admin"
div.draggable=true

div.innerHTML = `
<img src="${url}">
<div class="foto-admin-info">
<span class="foto-admin-numero">Posição ${index + 1}</span>
<button type="button" class="foto-admin-apagar" onclick="apagarImagemExistente(${index})">Apagar</button>
</div>
`

div.addEventListener("dragstart",()=>{dragIndex=index})
div.addEventListener("dragover",(e)=>{e.preventDefault()})
div.addEventListener("drop",()=>{

const item=imagensExistentes[dragIndex]
imagensExistentes.splice(dragIndex,1)
imagensExistentes.splice(index,0,item)

renderizarImagensAdmin()

})

container.appendChild(div)

})

}

async function apagarImagemExistente(index){

if(!confirm("Apagar esta fotografia?")) return

const url = imagensExistentes[index]

/* extrair caminho correto do ficheiro */

const partes = url.split("/object/public/imoveis/")

if(partes.length < 2){
alert("Não foi possível encontrar o ficheiro no storage")
console.log(url)
return
}

const filePath = decodeURIComponent(partes[1])

/* apagar do storage */

const { error } = await supabaseClient
.storage
.from("imoveis")
  console.log(filePath)
    .remove([filePath])

if(error){
alert("Erro ao apagar no Supabase")
console.log(error)
return
}

/* remover da lista */

imagensExistentes.splice(index,1)

renderizarImagensAdmin()

}

async function gerarJSON(){

const files=document.getElementById("imagens").files
let novas=[]

for(let file of files){

const fileName=`${Date.now()}-${file.name}`

await supabaseClient.storage
.from("imoveis")
.upload(fileName,file)

const {data}=supabaseClient.storage
.from("imoveis")
.getPublicUrl(fileName)

novas.push(data.publicUrl)

}

const imagensFinais=[...imagensExistentes,...novas]

const novoImovel={
titulo:titulo.value,
slug:slug.value,
local:local.value,
preco:preco.value,
estado:estado.value,
tipologia:tipologia.value,
quartos:quartos.value,
wc:wc.value,
area_bruta:area_bruta.value,
area_util:area_util.value,
categoria_energetica:categoria_energetica.value,
descricao:descricao.value,
imagens:imagensFinais
}

if(imovelEditando){

await supabaseClient
.from("imoveis")
.update(novoImovel)
.eq("id",imovelEditando)

}else{

await supabaseClient
.from("imoveis")
.insert([novoImovel])

}

alert("Imóvel guardado")

imovelEditando=null
imagensExistentes=[]
renderizarImagensAdmin()

document.querySelectorAll("input,textarea").forEach(el=>el.value="")

carregarListaAdmin()

}

async function carregarListaAdmin(){

const {data}=await supabaseClient
.from("imoveis")
.select("*")
.order("id",{ascending:false})

const container=document.getElementById("lista-imoveis-admin")

container.innerHTML=""

data.forEach(imovel=>{

const div=document.createElement("div")
div.className="item-admin"

div.innerHTML=`
<span>${imovel.titulo}</span>
<div>
<button onclick="editarImovel('${imovel.id}')">Editar</button>
<button onclick="apagarImovel('${imovel.id}')">Apagar</button>
</div>
`

container.appendChild(div)

})

}

async function editarImovel(id){

const {data}=await supabaseClient
.from("imoveis")
.select("*")
.eq("id",id)
.single()

titulo.value=data.titulo
slug.value=data.slug
local.value=data.local
preco.value=data.preco
estado.value=data.estado
descricao.value=data.descricao

tipologia.value=data.tipologia||""
quartos.value=data.quartos||""
wc.value=data.wc||""
area_bruta.value=data.area_bruta||""
area_util.value=data.area_util||""
categoria_energetica.value=data.categoria_energetica||""

imagensExistentes=data.imagens||[]

renderizarImagensAdmin()

imovelEditando=id

document.getElementById("botaoGuardar").innerText="Atualizar imóvel"

}

async function apagarImovel(id){

if(!confirm("Apagar imóvel?")) return

await supabaseClient
.from("imoveis")
.delete()
.eq("id",id)

carregarListaAdmin()

}

titulo.addEventListener("input",function(){

const s=this.value
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9\s-]/g,"")
.trim()
.replace(/\s+/g,"-")

slug.value=s

})

carregarListaAdmin()

</script>

</div>
</body>
</html>
